# Fails the job if npm audit reports high or critical vulnerabilities (aligned with Dependabot severities).
name: npm audit

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mnemo-mobile/package-lock.json

      - name: Install and audit (root)
        run: npm ci && npm audit --audit-level=high

      - name: Install and audit (mobile)
        working-directory: apps/mnemo-mobile
        run: npm ci && npm audit --audit-level=high
