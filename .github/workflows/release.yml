# Publishes GitHub Releases with zip assets. Runs ONLY when a tag matching `v*` is pushed — not on PRs or merges to master.
# After merging a release PR: git tag -a vX.Y.Z <merge-commit> && git push origin vX.Y.Z
# (The separate “CI: Windows installer” workflow validates builds on PRs but does not ship a Release.)
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows (Squirrel + zip)
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # Secrets cannot be referenced in step `if:` — use job env (same values) for conditionals.
      WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Azure Artifact Signing (Trusted Signing): preferred when secrets + repo variables are set.
      # See docs/CODE_SIGNING.md — forge.config.js uses PFX only if WINDOWS_CERTIFICATE_FILE exists.
      - name: Set up Azure Artifact Signing (NuGet dlib + metadata + SignTool)
        id: azure_signing
        if: ${{ env.AZURE_CLIENT_ID != '' && vars.AZURE_CODESIGNING_ENDPOINT != '' && vars.AZURE_CODESIGNING_ACCOUNT_NAME != '' && vars.AZURE_CERTIFICATE_PROFILE_NAME != '' }}
        shell: pwsh
        env:
          AZURE_CODESIGNING_ENDPOINT: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          AZURE_CODESIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGNING_ACCOUNT_NAME }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
        run: ./scripts/ci/azure-trusted-signing-setup.ps1

      - name: Prepare Windows code signing certificate (PFX fallback)
        # Skip PFX when Azure Artifact Signing is fully configured (Trusted Signing takes precedence in forge.config.js).
        if: ${{ env.WINDOWS_CERTIFICATE_PFX_B64 != '' && (env.AZURE_CLIENT_ID == '' || vars.AZURE_CODESIGNING_ENDPOINT == '' || vars.AZURE_CODESIGNING_ACCOUNT_NAME == '' || vars.AZURE_CERTIFICATE_PROFILE_NAME == '') }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_B64)
          $path = Join-Path $env:GITHUB_WORKSPACE 'certificate.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          "WINDOWS_CERTIFICATE_FILE=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create Windows installers
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_SERVER: ${{ vars.WINDOWS_TIMESTAMP_SERVER }}
        run: npm run make

      - name: Zip Windows out/make
        shell: pwsh
        run: |
          Compress-Archive -Path .\out\make\* -DestinationPath "mnemo-${{ github.ref_name }}-windows-x64.zip"

      - name: Upload Windows zip (staging)
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: mnemo-${{ github.ref_name }}-windows-x64.zip
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux (.deb + zip)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install packaging and native build deps
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg zip build-essential python3

      - name: Install dependencies
        run: npm ci

      - name: Create Linux installers
        run: npm run make

      - name: Zip Linux out/make
        run: |
          (cd out/make && zip -r "${GITHUB_WORKSPACE}/mnemo-${GITHUB_REF_NAME}-linux-amd64.zip" .)

      - name: Upload Linux zip (staging)
        uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: mnemo-${{ github.ref_name }}-linux-amd64.zip
          if-no-files-found: error
          retention-days: 30

  build-macos:
    name: Build macOS (zip)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Zip output matches the runner CPU (macos-latest is typically arm64).
      - name: Create macOS installers
        run: npm run make

      - name: Zip macOS out/make
        run: |
          (cd out/make && zip -r "${GITHUB_WORKSPACE}/mnemo-${GITHUB_REF_NAME}-macos.zip" .)

      - name: Upload macOS zip (staging)
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: mnemo-${{ github.ref_name }}-macos.zip
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release assets
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download build zips
        uses: actions/download-artifact@v4
        with:
          path: assets

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/windows-zip/*.zip
            assets/linux-zip/*.zip
            assets/macos-zip/*.zip
          generate_release_notes: true
          make_latest: ${{ !contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
