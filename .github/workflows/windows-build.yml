# Build Squirrel installer (MnemoSetup.exe) + zip on Windows runners — no local Windows machine required.
name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'forge.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'webpack*.js'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [master, main]

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Windows code signing certificate
        if: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 != '' }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_B64)
          $path = Join-Path $env:GITHUB_WORKSPACE 'certificate.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          "WINDOWS_CERTIFICATE_FILE=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create Windows installers
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_SERVER: ${{ vars.WINDOWS_TIMESTAMP_SERVER }}
        run: npm run make

      - name: Upload installers (Squirrel + zip)
        uses: actions/upload-artifact@v4
        with:
          name: mnemo-windows-${{ github.run_number }}-${{ github.sha }}
          path: out/make/**
          if-no-files-found: error
          retention-days: 90
