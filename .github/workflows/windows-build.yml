# CI only: builds Windows installers and uploads them as workflow artifacts — does NOT create a GitHub Release.
# To publish installers and attach them to a GitHub Release, push an annotated tag `v*` (see `.github/workflows/release.yml`).
name: 'CI: Windows installer (artifacts only)'

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'forge.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'webpack*.js'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [master, main]

concurrency:
  group: windows-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  make:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      # Secrets cannot be referenced in step `if:` — use job env (same values) for conditionals.
      WINDOWS_CERTIFICATE_PFX_B64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_B64 }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Azure Artifact Signing (NuGet dlib + metadata + SignTool)
        if: ${{ env.AZURE_CLIENT_ID != '' && vars.AZURE_CODESIGNING_ENDPOINT != '' && vars.AZURE_CODESIGNING_ACCOUNT_NAME != '' && vars.AZURE_CERTIFICATE_PROFILE_NAME != '' }}
        shell: pwsh
        env:
          AZURE_CODESIGNING_ENDPOINT: ${{ vars.AZURE_CODESIGNING_ENDPOINT }}
          AZURE_CODESIGNING_ACCOUNT_NAME: ${{ vars.AZURE_CODESIGNING_ACCOUNT_NAME }}
          AZURE_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_CERTIFICATE_PROFILE_NAME }}
        run: ./scripts/ci/azure-trusted-signing-setup.ps1

      - name: Prepare Windows code signing certificate (PFX fallback)
        if: ${{ env.WINDOWS_CERTIFICATE_PFX_B64 != '' && (env.AZURE_CLIENT_ID == '' || vars.AZURE_CODESIGNING_ENDPOINT == '' || vars.AZURE_CODESIGNING_ACCOUNT_NAME == '' || vars.AZURE_CERTIFICATE_PROFILE_NAME == '') }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_B64)
          $path = Join-Path $env:GITHUB_WORKSPACE 'certificate.pfx'
          [IO.File]::WriteAllBytes($path, $bytes)
          "WINDOWS_CERTIFICATE_FILE=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create Windows installers
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_SERVER: ${{ vars.WINDOWS_TIMESTAMP_SERVER }}
        run: npm run make

      - name: Upload installers (Squirrel + zip)
        uses: actions/upload-artifact@v4
        with:
          name: mnemo-windows-${{ github.run_number }}-${{ github.sha }}
          path: out/make/**
          if-no-files-found: error
          retention-days: 90
